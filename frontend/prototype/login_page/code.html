<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-surface": "#26313f",
              "background": "#f8f9ff",
              "inverse-on-surface": "#eaf1ff",
              "tertiary": "#35445a",
              "surface-container-high": "#dee9fc",
              "secondary": "#006e2a",
              "on-surface": "#111c2a",
              "surface-tint": "#0c56d0",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "secondary-fixed": "#69ff87",
              "surface": "#f8f9ff",
              "outline": "#737685",
              "inverse-primary": "#b2c5ff",
              "secondary-fixed-dim": "#3ce36a",
              "on-surface-variant": "#434654",
              "on-primary-container": "#c4d2ff",
              "tertiary-container": "#4c5c72",
              "on-secondary-fixed": "#002108",
              "on-error": "#ffffff",
              "surface-variant": "#d8e3f6",
              "tertiary-fixed-dim": "#b7c8e1",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "on-secondary-container": "#00732c",
              "surface-dim": "#cfdbee",
              "primary-container": "#0052cc",
              "on-primary": "#ffffff",
              "on-primary-fixed": "#001848",
              "on-tertiary-fixed": "#0b1c30",
              "on-background": "#111c2a",
              "primary-fixed-dim": "#b2c5ff",
              "primary": "#003d9b",
              "surface-container-low": "#eff4ff",
              "surface-bright": "#f8f9ff",
              "on-primary-fixed-variant": "#0040a2",
              "error": "#ba1a1a",
              "secondary-container": "#5cfd80",
              "primary-fixed": "#dae2ff",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#c4d4ee",
              "on-tertiary-fixed-variant": "#38485d",
              "surface-container": "#e5eeff",
              "on-secondary-fixed-variant": "#00531e",
              "tertiary-fixed": "#d3e4fe",
              "outline-variant": "#c3c6d6",
              "surface-container-highest": "#d8e3f6"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-ghost-border {
            border: 1px solid rgba(195, 198, 214, 0.2);
        }
    </style>
</head>
<body class="bg-surface-container-lowest min-h-screen flex items-center justify-center font-body antialiased">
<!-- Auth Container -->
<main class="w-full max-w-[1440px] px-6 py-12 flex flex-col items-center">
<!-- Brand Logo Header -->
<header class="mb-10 flex flex-col items-center">
<div class="mb-4">
<span class="text-primary-container font-black text-3xl tracking-tighter">SecureID</span>
</div>
<h1 class="text-on-surface text-3xl md:text-4xl font-headline font-bold tracking-tight">Masuk ke SecureID</h1>
<p class="text-on-surface-variant mt-2 text-sm">Silakan masuk untuk mengelola dokumen digital Anda</p>
</header>
<!-- Login Card -->
<div class="w-full max-w-md bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0px_4px_20px_rgba(17,28,42,0.06)] signature-ghost-border">
<form class="space-y-6">
<!-- Input Identity -->
<div class="space-y-2">
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase label-style" for="email">Email atau Nomor HP</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-outline pointer-events-none">
<span class="material-symbols-outlined text-xl">person</span>
</span>
<input class="w-full pl-10 pr-4 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-outline transition-all duration-300" id="email" name="email" placeholder="contoh@email.com" type="text"/>
</div>
</div>
<!-- Input Password -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase label-style" for="password">Kata Sandi</label>
<a class="text-xs font-semibold text-primary-container hover:underline" href="#">Lupa kata sandi?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-outline pointer-events-none">
<span class="material-symbols-outlined text-xl">lock</span>
</span>
<input class="w-full pl-10 pr-12 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-outline transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary py-4 px-6 rounded-xl font-bold text-base shadow-sm hover:brightness-110 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span>Masuk</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant opacity-30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest text-on-surface-variant">
<span class="bg-surface-container-lowest px-4">Atau masuk dengan</span>
</div>
</div>
<!-- SSO Options -->
<div class="space-y-3">
<button class="w-full bg-surface-container-low text-on-surface border border-outline-variant/20 py-3.5 px-6 rounded-lg font-medium text-sm flex items-center justify-center gap-3 hover:bg-surface-container-high transition-colors active:scale-[0.98]">
<img alt="PrivyID Logo" class="w-6 h-6 object-contain" data-alt="abstract professional minimalist icon for digital identity service in blue and white colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBz7YjWKLKTeL06hzSB46pOXiutHhfODyto_u6yZik-NdofgBNZkYJz7znJMIQjsHDz39JZhVcP9LbSlDzYMc49lk7JV8j9aofDs5J4wY_dWmbB6qR5yeevfT4qmhuBlT5och6ZR40ydHRVLyjwmMhJW44WRisR8J0-Yr0VUdWFrlp_ApOeiLqKfqufsunzGLukVZXYLBDjlnAwcdxFQQcqIe9_EgS1ermfcpPCVnRNgGHhx570K3kMcBYUyD1l1KT8fsJYwb37tqTa"/>
<span>Login dengan PrivyID</span>
</button>
</div>
</div>
<!-- Footer Link -->
<footer class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
                Belum punya akun? 
                <a class="text-primary-container font-bold hover:underline ml-1" href="#">Daftar sekarang</a>
</p>
</footer>
<!-- Security Badge -->
<div class="mt-12 flex items-center gap-6 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-lg">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">End-to-End Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-lg">policy</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">ISO 27001 Certified</span>
</div>
</div>
</main>
<!-- Decorative Elements (Asymmetric Architecture) -->
<div class="fixed top-0 left-0 w-1/4 h-full bg-surface-container-low -z-10 opacity-30 pointer-events-none"></div>
<div class="fixed top-20 right-20 w-64 h-64 bg-primary-container/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-20 left-40 w-80 h-80 bg-secondary-container/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
</body></html>
