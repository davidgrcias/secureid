<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verifikasi Identitas - Liveness Check</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#f8f9ff",
                        "on-error": "#ffffff",
                        "tertiary": "#35445a",
                        "secondary-fixed-dim": "#3ce36a",
                        "primary-container": "#0052cc",
                        "on-primary-container": "#c4d2ff",
                        "surface-container-high": "#dee9fc",
                        "secondary-container": "#5cfd80",

                        "primary": "#003d9b",

                        "inverse-surface": "#26313f",
                        "primary-fixed": "#dae2ff",
                        "surface-bright": "#f8f9ff",
                        "tertiary-fixed": "#d3e4fe",
                        "on-surface": "#111c2a",
                        "on-tertiary-fixed": "#0b1c30",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#69ff87",
                        "on-primary-fixed-variant": "#0040a2",
                        "surface-container": "#e5eeff",
                        "primary-fixed-dim": "#b2c5ff",
                        "inverse-primary": "#b2c5ff",
                        "tertiary-container": "#4c5c72",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434654",
                        "on-tertiary-fixed-variant": "#38485d",

                        "outline": "#737685",

                        "secondary": "#006e2a",

                        "surface": "#f8f9ff",
                        "on-secondary-fixed": "#002108",
                        "surface-container-highest": "#d8e3f6",
                        "surface-variant": "#d8e3f6",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-tint": "#0c56d0",
                        "on-background": "#111c2a",
                        "on-tertiary-container": "#c4d4ee",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#cfdbee"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .camera-overlay {
            background: radial-gradient(circle, transparent 30%, rgba(17, 28, 42, 0.95) 75%);
        }
        .progress-ring {
            stroke-dasharray: 283;
            stroke-dashoffset: 70;
        }
    </style>
</head>
<body class="bg-on-surface font-body text-surface overflow-hidden">
<!-- Verifikasi Identitas - Liveness Interface -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-between py-12 px-6">
<!-- Top Navigation (Mocked from Shared Components Shell logic) -->
<header class="fixed top-0 left-0 w-full px-6 h-20 flex items-center justify-between z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-md text-white hover:bg-white/20 transition-all">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex flex-col items-center">
<span class="text-xs font-label uppercase tracking-widest text-surface-variant/60">Sesi Keamanan</span>
<span class="text-sm font-semibold text-white tracking-tight">Verifikasi Wajah</span>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Camera Simulation Canvas -->
<main class="flex-1 w-full max-w-lg flex flex-col items-center justify-center relative">
<!-- Dynamic Instruction Header -->
<div class="mb-8 text-center animate-pulse">
<h1 class="text-2xl font-headline font-bold text-white mb-2">Posisikan wajah Anda di dalam bingkai</h1>
<p class="text-surface-variant text-sm font-medium">Pastikan pencahayaan cukup dan wajah terlihat jelas</p>
</div>
<!-- Oval Camera Frame & Progress Ring -->
<div class="relative w-full aspect-[3/4] max-w-[320px] flex items-center justify-center">
<!-- Progress Ring SVG -->
<svg class="absolute inset-0 w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" vector-effect="non-scaling-stroke"></circle>
<circle class="progress-ring text-secondary-fixed" cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-linecap="round" stroke-width="2.5" style="stroke-dasharray: 301.59; stroke-dashoffset: 75;" vector-effect="non-scaling-stroke"></circle>
</svg>
<!-- Inner Camera Feed Placeholder -->
<div class="w-[92%] h-[92%] rounded-[140px/180px] overflow-hidden bg-surface-dim relative group">
<img class="w-full h-full object-cover grayscale-[0.2]" data-alt="Close-up portrait of a professional individual centered in a bright oval frame, soft clinical lighting, high definition, looking directly at camera" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDi1ewxPIIRMGyEzFf9jk0frk54DJiMsAW-72hfUvsfxaPqv0tJh2m0iNpJkjowJD48rybC0DtwcuVl4P3JRVDzxY0UMc7wXkKBQGMRwY8FPcollluraRX7rtyJDMjuy63sTjXJt0mbhswUQlX3csTr2rIeqZdcrY5E0IPHplHBEKHtuM3JyFFXOffKMIrxaTC7FO6iCgl7o2omeeZ9LmoGmHEfQKRVBDRj7yshfGeWK6ve_CwlqpuMPB6eNOf18s2gmJC7VvwY6pmP"/>
<!-- Success Overlay -->
<div class="absolute inset-0 bg-secondary/20 flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-secondary-container text-6xl" data-icon="verified" data-weight="fill">verified</span>
</div>
</div>
<!-- Scanning Line Effect -->
<div class="absolute top-1/4 left-0 w-full h-[2px] bg-secondary-fixed/50 shadow-[0_0_15px_rgba(60,227,106,0.8)] z-10"></div>
</div>
<!-- Dynamic Prompt & Countdown -->
<div class="mt-12 text-center bg-white/10 backdrop-blur-xl px-8 py-4 rounded-xl border border-white/10">
<div class="flex items-center space-x-4">
<div class="relative flex items-center justify-center">
<span class="text-3xl font-headline font-extrabold text-secondary-fixed">5</span>
<div class="absolute w-10 h-10 border-2 border-secondary-fixed/30 rounded-full"></div>
</div>
<div class="text-left">
<span class="block text-xs uppercase font-label tracking-tighter text-surface-variant">Instruksi Berikutnya</span>
<span class="block text-xl font-bold text-white">Berkedip sekarang</span>
</div>
</div>
</div>
</main>
<!-- Progress and Footer -->
<footer class="w-full max-w-md pb-8 px-4 flex flex-col items-center">
<!-- Progress Steps -->
<div class="w-full flex justify-between mb-4">
<div class="flex items-center space-x-1">
<span class="w-2 h-2 rounded-full bg-secondary-fixed"></span>
<span class="w-2 h-2 rounded-full bg-secondary-fixed"></span>
<span class="w-2 h-2 rounded-full bg-white/20"></span>
<span class="w-2 h-2 rounded-full bg-white/20"></span>
</div>
<span class="text-[10px] font-label text-surface-variant uppercase tracking-widest">Tahap 2 dari 4: Deteksi Liveness</span>
</div>
<!-- Progress Bar Background -->
<div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
<!-- Progress Fill -->
<div class="h-full w-3/4 bg-gradient-to-r from-primary-container to-secondary-fixed-dim rounded-full shadow-[0_0_10px_rgba(60,227,106,0.3)]"></div>
</div>
<div class="mt-8 flex items-center text-surface-variant/40 text-[10px] space-x-2">
<span class="material-symbols-outlined text-xs" data-icon="lock">lock</span>
<span class="uppercase tracking-widest font-label">SecureID V2 Encryption Active</span>
</div>
</footer>
<!-- Background Atmospheric Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-[-1]">
<div class="absolute -top-[10%] -right-[10%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[100px]"></div>
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')] opacity-20"></div>
</div>
</div>
<!-- Feedback Toasts (Mockup) -->
<div class="fixed bottom-32 left-1/2 -translate-x-1/2 z-50">
<div class="bg-secondary/90 backdrop-blur-md text-white px-6 py-3 rounded-full flex items-center space-x-3 shadow-2xl shadow-secondary/20">
<span class="material-symbols-outlined text-lg" data-icon="check_circle">check_circle</span>
<span class="text-sm font-semibold tracking-tight">Wajah Terdeteksi: Berhasil</span>
</div>
</div>
</body></html>
